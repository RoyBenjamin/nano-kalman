<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nano-kalman — a Kalman filter from scratch</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230B0E14'/%3E%3Cellipse cx='16' cy='16' rx='12' ry='7' fill='none' stroke='%234FD6C4' stroke-width='2.5' transform='rotate(-24 16 16)'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%234FD6C4'/%3E%3C/svg%3E">
<style>
@font-face { font-family: 'Space Grotesk'; font-weight: 300 700; font-display: swap;
  src: url(assets/fonts/SpaceGrotesk.woff2) format('woff2'); }
@font-face { font-family: 'JetBrains Mono'; font-weight: 400; font-display: swap;
  src: url(assets/fonts/JetBrainsMono-Regular.woff2) format('woff2'); }
:root {
  --bg: #0B0E14; --surface: #141922; --text: #E6EAF2; --muted: #8A93A6;
  --accent: #4FD6C4; --edge: #222A37;
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s6: 24px; --s8: 32px;
  --disp: 'Space Grotesk', system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; }
body { background: var(--bg); color: var(--text); font: 15px/1.5 system-ui, sans-serif; }
main { max-width: 920px; margin: 0 auto; padding: var(--s6) var(--s4) var(--s4); }
header { display: flex; align-items: baseline; gap: var(--s3); flex-wrap: wrap; margin-bottom: var(--s3); }
h1 { font-family: var(--disp); font-weight: 600; font-size: 22px; letter-spacing: -0.02em; }
.tag { color: var(--muted); font-family: var(--disp); font-size: 14px; }
.legend { list-style: none; display: flex; gap: var(--s4); margin-left: auto; padding: 0;
  color: var(--muted); font-family: var(--disp); font-size: 12.5px; }
.legend li::before { content: ''; display: inline-block; margin-right: var(--s2); }
.truth::before { width: 9px; height: 9px; border-radius: 50%; background: rgba(230,234,242,0.35); }
.meas::before { width: 6px; height: 6px; background: var(--muted); }
.belief::before { width: 14px; height: 3px; border-radius: 2px; background: var(--accent); vertical-align: 3px; }
canvas { display: block; width: 100%; border: 1px solid var(--edge); border-radius: 6px; touch-action: none; }
.panel { display: flex; gap: var(--s6); align-items: center; flex-wrap: wrap;
  background: var(--surface); border: 1px solid var(--edge); border-radius: 6px;
  padding: var(--s3) var(--s4); margin-top: var(--s3); }
.presets { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s2); }
button { font-family: var(--disp); font-size: 13px; color: var(--text); background: none;
  border: 1px solid var(--edge); border-radius: 4px; padding: var(--s1) var(--s3);
  cursor: pointer; transition: border-color 120ms, color 120ms; }
button:hover { border-color: var(--muted); }
button:active { border-color: var(--accent); color: var(--accent); }
.sliders { flex: 1; min-width: 260px; display: grid; gap: var(--s2); }
.sliders label { display: grid; grid-template-columns: auto 1fr 2.5em; gap: var(--s3);
  align-items: center; font-family: var(--disp); font-size: 13px; white-space: nowrap; }
.sliders .chk { display: flex; gap: var(--s2); color: var(--muted); }
input[type=range] { accent-color: var(--accent); min-width: 100px; }
input[type=checkbox] { accent-color: var(--accent); }
output { font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 13px; color: var(--muted); text-align: right; }
.readout { margin-left: auto; text-align: right; }
.readout .lbl { display: block; color: var(--muted); font-family: var(--disp); font-size: 12px; }
.readout strong { font: 20px var(--mono); font-variant-numeric: tabular-nums; color: var(--accent); }
footer { margin-top: var(--s4); color: var(--muted); font-family: var(--disp); font-size: 12.5px; }
footer a { color: var(--muted); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) { button { transition: none; } }
</style>
<body>
<main>
  <header>
    <h1>nano-kalman</h1>
    <p class="tag">agents act on beliefs, not observations</p>
    <ul class="legend">
      <li class="truth">truth</li>
      <li class="meas">measurements</li>
      <li class="belief">belief ± ellipse</li>
    </ul>
  </header>
  <canvas id="c"></canvas>
  <div class="panel">
    <div class="presets">
      <button data-preset="noisy">noisy sensor</button>
      <button data-preset="occlude">occlusion</button>
      <button data-preset="ghost">overconfident model</button>
      <button data-preset="kidnap">kidnap</button>
    </div>
    <div class="sliders">
      <label>σ_obs · trust the sensor
        <input id="sobs" type="range" min="1" max="40" step="1" value="12">
        <output id="vobs">12</output>
      </label>
      <label>σ_a · trust the model
        <input id="sacc" type="range" min="0" max="60" step="1" value="25">
        <output id="vacc">25</output>
      </label>
      <label class="chk"><input id="occ" type="checkbox"> occlusion strip — drag it on the canvas</label>
    </div>
    <div class="readout">
      <span class="lbl">innovation |z − Hx̂⁻|</span>
      <strong id="innov">—</strong>
    </div>
  </div>
  <footer>nano-kalman · part 1 of the <a href="https://github.com/RoyBenjamin">nano world-models series</a> · MIT</footer>
</main>
<script src="world.js"></script>
<script src="kalman.js"></script>
<script src="ui.js"></script>
</body>
</html>
